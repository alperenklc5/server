<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Downloader PRO - Hızlı & Ücretsiz</title>
    <a id="downloadLink" href="javascript:void(0)" target="_blank" class="btn btn-success btn-lg w-100 shadow-sm" style="display: none; border-radius: 10px;">
    <i class="bi bi-download me-2"></i> Hemen İndir (MP4)
    </a>
    <style>
        body { background-color: #f8fafc; font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; align-items: center; }
        .main-card { border: none; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .input-group { border-radius: 12px; overflow: hidden; }
        .btn-extract { padding: 12px 30px; font-weight: 600; }
        #previewCard { border-radius: 15px; border: 1px solid #e2e8f0; transition: all 0.3s ease; }
    </style>
</head>
<body>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-7">
                <div class="text-center mb-5">
                    <h1 class="fw-bold text-dark">Video Downloader PRO</h1>
                    <p class="text-muted">Herhangi bir platformdan anında yüksek kaliteli video indirin.</p>
                </div>

                <div class="card main-card p-4">
                    <form id="downloadForm">
                        <div class="input-group mb-3 shadow-sm">
                            <input type="text" id="urlInput" class="form-control form-control-lg border-0" placeholder="Video linkini buraya yapıştırın..." required>
                            <button class="btn btn-primary btn-extract" type="submit" id="fetchBtn">
                                <i class="bi bi-magic me-2"></i> Çözümle
                            </button>
                        </div>
                    </form>

                    <div id="status" class="mt-3 text-center" style="display: none; font-weight: 500;"></div>

                    <div id="previewCard" class="mt-4 p-4 bg-light text-center" style="display: none;">
                        <i class="bi bi-check-circle-fill text-success mb-2" style="font-size: 2rem;"></i>
                        <h5 id="videoTitle" class="mb-4 fw-bold text-truncate">Video Başlığı</h5>
                        <a id="downloadLink" href="#" target="_blank" class="btn btn-success btn-lg w-100 shadow-sm" style="border-radius: 10px;">
                            <i class="bi bi-download me-2"></i> Hemen İndir (MP4)
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    // Kodun çalıştığını teyit etmek için konsola yazı basalım
    console.log("SİSTEM GÜNCEL: Versiyon 2.1 devrede!");

    const downloadForm = document.getElementById('downloadForm');
    
    if (downloadForm) {
        downloadForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const urlInput = document.getElementById('urlInput');
            const status = document.getElementById('status');
            const fetchBtn = document.getElementById('fetchBtn');
            const previewCard = document.getElementById('previewCard');
            const downloadLink = document.getElementById('downloadLink');

            // Ekran Hazırlığı
            status.style.display = 'block';
            status.style.color = '#3b82f6';
            status.innerHTML = '<div class="spinner-border spinner-border-sm me-2"></div> Video işleniyor...';
            fetchBtn.disabled = true;
            previewCard.style.display = 'none';

            try {
                const response = await fetch('/get-video', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: urlInput.value })
                });

                const data = await response.json();

                if (data.status === "success") {
                    status.style.display = 'none';
                    document.getElementById('videoTitle').innerText = data.title;
                    downloadLink.href = data.url;
                    previewCard.style.display = 'block';
                } else {
                    status.style.color = '#dc2626';
                    status.innerHTML = 'Hata: ' + data.message;
                }
            } catch (error) {
                status.style.color = '#dc2626';
                status.innerHTML = 'Sunucu bağlantı hatası!';
            } finally {
                fetchBtn.disabled = false;
            }
        });
    }
}); // <--- İşte buralarda bir parantez eksikti!
</script>
</body>
</html>
