<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Downloader PRO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f0f0f; color: white; font-family: 'Poppins', sans-serif; display: flex; align-items: center; min-height: 100vh; }
        .card { background: #1a1a1a; border: 1px solid #333; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); padding: 30px; }
        .btn-neon { background-color: #00ffcc; color: #000; font-weight: bold; border: none; transition: 0.3s; }
        .btn-neon:hover { background-color: #00d4aa; transform: scale(1.05); }
        input { background-color: #222 !important; border: 1px solid #444 !important; color: white !important; }
        .status-msg { margin-top: 20px; font-size: 0.9rem; color: #aaa; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card text-center">
                    <h2 style="color: #00ffcc; margin-bottom: 25px;">Video Downloader PRO</h2>
                    <p>Paste the video link below to download from any platform.</p>
                    <div class="input-group mb-3">
                        <input type="text" id="videoUrl" class="form-control" placeholder="https://x.com/video/..." required>
                    </div>
                    <button class="btn btn-neon w-100 py-2" onclick="downloadVideo()">DOWNLOAD FROM SERVER</button>
                    <div id="status" class="status-msg"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function downloadVideo() {
            const url = document.getElementById('videoUrl').value;
            const status = document.getElementById('status');
            if (!url) { alert("Please paste a link!"); return; }

            status.innerHTML = "Processing video... Please wait.";
            
            try {
                const response = await fetch('/get-video', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: url })
                });
                const data = await response.json();
                
                if (data.status === "success") {
                    status.innerHTML = "Success! Starting download...";
                    window.location.href = data.url;
                } else {
                    status.innerHTML = "Error: " + data.message;
                }
            } catch (error) {
                status.innerHTML = "Server connection failed!";
            }
        }
    </script>
</body>
</html>
