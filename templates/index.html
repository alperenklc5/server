<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Downloader PRO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; min-height: 100vh; display: flex; align-items: center; }
        .download-card { border: none; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); background: white; padding: 40px; }
        .btn-extract { border-radius: 10px; font-weight: 600; padding: 12px 25px; }
        #downloadLink { border-radius: 12px; font-weight: bold; transition: transform 0.2s; }
        #downloadLink:hover { transform: scale(1.02); }
    </style>
</head>
<body>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="download-card text-center">
                    <h1 class="mb-4 fw-bold text-primary">Video Downloader PRO</h1>
                    
                    <form id="downloadForm">
                        <div class="mb-3">
                            <input type="text" id="urlInput" class="form-control form-control-lg text-center" placeholder="Video linkini yapıştırın..." required style="border-radius: 12px;">
                        </div>
                        <button type="submit" id="fetchBtn" class="btn btn-primary btn-lg w-100 btn-extract">
                            <i class="bi bi-magic me-2"></i> Çözümle
                        </button>
                    </form>

                    <div id="status" class="mt-4" style="display: none;"></div>

                    <div id="previewCard" class="mt-4" style="display: none;">
                        <h5 id="videoTitle" class="text-dark mb-4 fw-bold">Video Hazır!</h5>
                      <a id="downloadLink" href="javascript:void(0)" target="_blank" class="btn btn-success btn-lg w-100 shadow" style="display: none; border-radius: 10px;">
    <i class="bi bi-cloud-arrow-down-fill me-2"></i> Videoyu İndir (MP4)
</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', () => {
        console.log("SİSTEM GÜNCEL: Versiyon 2.2 Aktif!");

        const downloadForm = document.getElementById('downloadForm');
        
        if (downloadForm) {
            downloadForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const urlInput = document.getElementById('urlInput');
                const status = document.getElementById('status');
                const fetchBtn = document.getElementById('fetchBtn');
                const previewCard = document.getElementById('previewCard');
                const downloadLink = document.getElementById('downloadLink');

                // UI Hazırlığı
                status.style.display = 'block';
                status.style.color = '#0d6efd';
                status.innerHTML = '<div class="spinner-border spinner-border-sm me-2"></div> İşlem yapılıyor...';
                fetchBtn.disabled = true;
                previewCard.style.display = 'none';

                // ... önceki kısımlar aynı (status.style.display = 'block' vs.)

try {
    console.log("ADIM 1: Link sunucuya gönderiliyor... Link:", urlInput.value);
    
    const response = await fetch('/get-video', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url: urlInput.value })
    });

    console.log("ADIM 2: Sunucudan cevap geldi! Durum Kodu:", response.status);

    // JSON yerine HTML gelip gelmediğini anlamak için ham veriyi okuyoruz
    const textData = await response.text();
    console.log("ADIM 3: Sunucudan gelen ham veri:", textData);

    // Şimdi veriyi JSON'a çeviriyoruz
    const data = JSON.parse(textData);
    console.log("ADIM 4: Veri JSON formatında okundu!", data);

    if (data.status === "success") {
        status.style.display = 'none';
        document.getElementById('videoTitle').innerText = data.title;
        
        const dLink = document.getElementById('downloadLink');
        dLink.href = data.url; 
        dLink.removeAttribute('download');
        dLink.style.display = 'block'; 
        
        previewCard.style.display = 'block';
    } else {
        status.style.color = '#dc3545';
        status.innerHTML = '<i class="bi bi-x-circle me-1"></i> Hata: ' + data.message;
    }
} catch (error) {
    // İşte sessiz çöküşleri yakalayacağımız yer!
    console.error("KRİTİK HATA YAKALANDI:", error);
    status.style.color = '#dc3545';
    status.innerHTML = 'Bağlantı koptu veya sunucu hatası! Konsola bakın.';
} finally {
    fetchBtn.disabled = false;
    console.log("ADIM 5: İşlem döngüsü bitti.");
}
           
            
            });
        }
    });
    </script>
</body>
</html>
